<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Biblioteca</title>

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* container da estante */

.estante{
  position:relative;
  width:100%;
  max-width:1600px;
}

/* imagem da estante */

.estante img.bg{
  width:100%;
  height:auto;
  display:block;
}

/* lombadas */

.livro{
  position:absolute;
  width:7.5%;           /* escala com a estante */
  cursor:pointer;
  transition:transform .25s;
}

.livro:hover{
  transform:translateY(-8%);
}
</style>
</head>

<body>

<div class="estante">

<img class="bg"
src="images/fundo.jpg">

<a href="cavaleiro.html">
<img class="livro"
src="images/lombadas/cavaleiro.png"
style="left:48.5%; top:45.5%;">
</a>

<a href="gaivota.html">
<img class="livro"
src="images/lombadas/gaivota.png"
style="left:61%; top:12%;">
</a>

</div>

</body>
</html>
