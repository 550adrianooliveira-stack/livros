<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Biblioteca</title>

<style>

body{
margin:0;
height:100vh;
background:url("https://images.unsplash.com/photo-1521587760476-6c12a4b040da") center/cover no-repeat;
font-family:serif;
}

/* container para posicionamento */

.estante{
position:relative;
width:100%;
height:100vh;
}

/* lombadas */

.livro{
position:absolute;
height:160px;
cursor:pointer;
transition:transform 0.3s, filter 0.3s;
}

.livro:hover{
transform:translateY(-8px);
filter:brightness(1.1);
}

</style>
</head>

<body>

<div class="estante">

<a href="cavaleiro.html">
<img class="livro" src="images/lombadas/cavaleiro.png"
style="left:44%; top:57%;">
</a>

<a href="gaivota.html">
<img class="livro" src="images/lombadas/gaivota.png"
style="left:48%; top:47%;">
</a>

</div>

</body>
</html>
