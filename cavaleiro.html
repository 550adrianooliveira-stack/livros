<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Cavaleiro da Dinamarca</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<style>
body{
  margin:0;
  background:#2c2c2c;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  font-family:serif;
}

#flipbook{
  width:900px;
  height:600px;
}

.page{
  background:white;
}

.page img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.barra{
  position:fixed;
  top:10px;
  left:10px;
  display:flex;
  gap:10px;
}

button{
  padding:8px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="barra">
  <button onclick="location.href='index.html'">📚 Biblioteca</button>
  <button onclick="fullscreen()">⛶ Fullscreen</button>
</div>

<audio id="musica" loop>
  <source src="musica-cavaleiro.mp3" type="audio/mpeg">
</audio>

<audio id="somvirar">
  <source src="virar.mp3" type="audio/mpeg">
</audio>

<div id="flipbook"></div>

<script>
const total = 17;
const pasta = "images/cavaleiro/";
const flipbook = document.getElementById("flipbook");

// 1️⃣ Criar todas as páginas primeiro

// Capa
flipbook.innerHTML += `<div class="page"><h2 style="text-align:center;padding-top:200px">O Cavaleiro da Dinamarca</h2></div>`;

// Páginas das imagens
for(let i=1; i<=total; i++){
  flipbook.innerHTML += `<div class="page"><img src="${pasta}Imagem${i}.jpg"></div>`;
}

// Créditos
flipbook.innerHTML += `<div class="page"><h2 style="text-align:center;padding-top:200px">Créditos</h2><p style="text-align:center">Ilustrações do 7º ano</p></div>`;

// 2️⃣ Agora inicializar o flipbook
$("#flipbook").turn({
  width:900,
  height:600,
  autoCenter:true,
  display:"double",
  gradients:true,
  elevation:50,
  when:{
    turning:function(){
      document.getElementById("somvirar").play();
    }
  }
});

// 3️⃣ Música de fundo
document.body.addEventListener("click",()=>{
  document.getElementById("musica").play();
},{once:true});

// 4️⃣ Fullscreen
function fullscreen(){
  document.documentElement.requestFullscreen();
}

// 5️⃣ Setas do teclado
document.addEventListener("keydown", function(e){
  if(e.key==="ArrowRight") $("#flipbook").turn("next");
  if(e.key==="ArrowLeft")  $("#flipbook").turn("previous");
});
</script>

</body>
</html>
