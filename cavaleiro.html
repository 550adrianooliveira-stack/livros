<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Cavaleiro da Dinamarca</title>

<!-- jQuery 2.x compatível -->
<script src="js/jquery-2.2.4.min.js"></script>
<!-- Turn.js local -->
<script src="js/turn.min.js"></script>

<style>
body{
  margin:0;
  background:#2c2c2c;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  font-family:serif;
}
#flipbook{
  width:900px;
  height:600px;
}
.page{
  background:white;
}
.page img{
  width:100%;
  height:100%;
  object-fit:contain;
}
.barra{
  position:fixed;
  top:10px;
  left:10px;
  display:flex;
  gap:10px;
}
button{
  padding:8px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="barra">
  <button onclick="location.href='index.html'">📚 Biblioteca</button>
  <button onclick="fullscreen()">⛶ Fullscreen</button>
</div>

<audio id="musica" loop>
  <source src="musica-cavaleiro.mp3" type="audio/mpeg">
</audio>

<audio id="somvirar">
  <source src="virar.mp3" type="audio/mpeg">
</audio>

<div id="flipbook"></div>

<script>
// -------- CONFIGURAÇÃO --------
const total = 17; // número de imagens
const pasta = "images/cavaleiro/";
const flipbook = document.getElementById("flipbook");

// -------- CRIAR PÁGINAS ANTES DE INICIALIZAR --------

// Capa
let capa = document.createElement("div");
capa.className = "page";
capa.innerHTML = `<h2 style="text-align:center;padding-top:200px">O Cavaleiro da Dinamarca</h2>`;
flipbook.appendChild(capa);

// Página em branco para manter paridade
let blank = document.createElement("div");
blank.className = "page";
flipbook.appendChild(blank);

// Páginas das imagens
for(let i=1;i<=total;i++){
  let p = document.createElement("div");
  p.className = "page";
  let img = document.createElement("img");
  img.src = `${pasta}Imagem${i}.jpg`;
  p.appendChild(img);
  flipbook.appendChild(p);
}

// Créditos
let credit = document.createElement("div");
credit.className = "page";
credit.innerHTML = `<h2 style="text-align:center;padding-top:200px">Créditos</h2>
<p style="text-align:center">Ilustrações do 7º ano</p>`;
flipbook.appendChild(credit);

// -------- INICIALIZAR TURN.JS --------
$("#flipbook").turn({
  width:900,
  height:600,
  autoCenter:true,
  display:"double",
  gradients:true,
  elevation:50,
  when:{
    turning:function(){
      const som = document.getElementById("somvirar");
      som.play().catch(()=>{}); // ignora erro se usuário ainda não interagiu
    }
  }
});

// -------- MÚSICA DE FUNDO APÓS CLIQUE --------
let musicaTocando = false;
document.addEventListener("click", () => {
  if(!musicaTocando){
    const musica = document.getElementById("musica");
    musica.play().catch(()=>{});
    musicaTocando = true;
  }
},{once:true});

// -------- FULLSCREEN --------
function fullscreen(){
  document.documentElement.requestFullscreen();
}

// -------- SETAS DO TECLADO --------
document.addEventListener("keydown", function(e){
  if(e.key==="ArrowRight") $("#flipbook").turn("next");
  if(e.key==="ArrowLeft")  $("#flipbook").turn("previous");
});
</script>

</body>
</html>
