<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>O Cavaleiro da Dinamarca</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<style>

body{
margin:0;
background:#2b2b2b;
font-family:serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

#flipbook{
width:900px;
height:600px;
margin-top:30px;
}

.page{
background:white;
}

.page img{
width:100%;
height:100%;
object-fit:contain;
}

.botoes{
position:fixed;
top:10px;
right:10px;
display:flex;
gap:10px;
}

button{
padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

#thumbnails{

position:fixed;
bottom:0;
left:0;
width:100%;
height:110px;
background:#111;
display:flex;
overflow-x:auto;
padding:10px;
gap:10px;

}

.thumb{

height:90px;
cursor:pointer;
border:2px solid transparent;

}

.thumb:hover{
border-color:white;
}

</style>

</head>

<body>

<div class="botoes">

<button onclick="location.href='index.html'">
📚 Biblioteca
</button>

<button onclick="fullscreen()">
⛶ Fullscreen
</button>

</div>

<audio id="musica" loop>
<source src="musica-cavaleiro.mp3">
</audio>

<audio id="somvirar">
<source src="virar.mp3">
</audio>

<div id="flipbook">

<div class="page">
<h2 style="text-align:center;padding-top:200px">
O Cavaleiro da Dinamarca
</h2>
</div>

    <div class="page"><img src="images/cavaleiro/Imagem1.png"></div>
    <div class="page"><img src="images/cavaleiro/Imagem2.png"></div>
    <div class="page"><img src="images/cavaleiro/Imagem3.png"></div>
    <div class="page"><img src="images/cavaleiro/Imagem4.png"></div>
    <div class="page"><img src="images/cavaleiro/Imagem5.png"></div>
    <div class="page"><img src="images/cavaleiro/Imagem6.png"></div>
    <div class="page"><img src="images/cavaleiro/Imagem7.png"></div>
    <div class="page"><img src="images/cavaleiro/Imagem8.png"></div>
    <div class="page"><img src="images/cavaleiro/Imagem9.png"></div>
    <div class="page"><img src="images/cavaleiro/Imagem10.png"></div>
    <div class="page"><img src="images/cavaleiro/Imagem11jpg"></div>
    <div class="page"><img src="images/cavaleiro/Imagem12jpg"></div>
    <div class="page"><img src="images/cavaleiro/Imagem13jpg"></div>
    <div class="page"><img src="images/cavaleiro/Imagem14jpg"></div>
    <div class="page"><img src="images/cavaleiro/Imagem15jpg"></div>
    <div class="page"><img src="images/cavaleiro/Imagem16jpg"></div>
    <div class="page"><img src="images/cavaleiro/Imagem17jpg"></div>
<div class="page">
<h2 style="text-align:center;padding-top:200px">
Créditos
</h2>

<p style="text-align:center">
Ilustrações do 7º ano
</p>

</div>

</div>

<div id="thumbnails">

<img class="thumb" src="images/cavaleiro/Imagem1.png" onclick="irPagina(2)">
<img class="thumb" src="images/cavaleiro/Imagem2.png" onclick="irPagina(3)">
<img class="thumb" src="images/cavaleiro/Imagem3.png" onclick="irPagina(4)">
<img class="thumb" src="images/cavaleiro/Imagem4.png" onclick="irPagina(5)">
<img class="thumb" src="images/cavaleiro/Imagem5.png" onclick="irPagina(6)">
<img class="thumb" src="images/cavaleiro/Imagem6.png" onclick="irPagina(7)">

</div>

<script>

$("#flipbook").turn({

width:900,
height:600,
autoCenter:true,
display:"double",
gradients:true,
elevation:50,

when:{
turning:function(){
document.getElementById("somvirar").play()
}
}

})

document.body.addEventListener("click",()=>{
document.getElementById("musica").play()
},{once:true})

function fullscreen(){

document.documentElement.requestFullscreen()

}

function irPagina(p){

$("#flipbook").turn("page",p)

}

document.addEventListener("keydown",function(e){

if(e.key==="ArrowRight"){
$("#flipbook").turn("next")
}

if(e.key==="ArrowLeft"){
$("#flipbook").turn("previous")
}

})

</script>

</body>

</html>
